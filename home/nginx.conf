server {
    listen 80;
    server_name localhost;

    # Portal Zen
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy para Gestor Proyectos
    location /gestor {
        resolver 127.0.0.11 valid=30s;
        set $upstream_gestor smarttrack_frontend_prod;
        proxy_pass http://$upstream_gestor:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy para Finanzas
    location /finanzas {
        resolver 127.0.0.11 valid=30s;
        set $upstream_finanzas finanzas_app;
        proxy_pass http://$upstream_finanzas:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
