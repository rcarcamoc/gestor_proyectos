services:
  db:
    image: mysql:8.4
    container_name: smarttrack_db_prod
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-smarttrack}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_USER: ${DB_USER:-user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-pass}
    ports:
      - "3306:3306"
    volumes:
      - db_prod_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smarttrack_network_prod

  backend:
    build:
      context: ./backend
    container_name: smarttrack_backend_prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    networks:
      - smarttrack_network_prod

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: smarttrack_frontend_prod
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - smarttrack_network_prod

  redis:
    image: redis:alpine
    container_name: smarttrack_redis_prod
    restart: always
    networks:
      - smarttrack_network_prod

  telegram-bot:
    build:
      context: ./telegram_bot
    container_name: smarttrack_telegram_bot_prod
    restart: always
    depends_on:
      - backend
      - redis
    env_file:
      - .env
    networks:
      - smarttrack_network_prod

networks:
  smarttrack_network_prod:
    driver: bridge

volumes:
  db_prod_data:
